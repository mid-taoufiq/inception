listen=YES
listen_ipv6=NO
background=NO
# Security: Disable anonymous login, enable local users
anonymous_enable=NO
local_enable=YES
# Allow users to upload and modify files
write_enable=YES
# Security: Jail the user inside their root directory
chroot_local_user=YES
allow_writeable_chroot=YES
# Only allow explicitly listed users to log in
userlist_enable=YES
userlist_file=/etc/vsftpd.userlist
userlist_deny=NO
# Passive Mode Configuration (Crucial for Docker)
pasv_enable=YES
# Tell FTP exactly which IP address to broadcast (Use your host machine IP or domain)
# If you leave this out or your network is weird, FTP will fail to send data.
pasv_address=127.0.0.1
pasv_min_port=3000
pasv_max_port=3020
# Make sure uploaded files get the correct permissions (022 umask means files are 644, folders 755)
local_umask=022