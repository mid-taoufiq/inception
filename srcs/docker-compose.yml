version: '3'

services:
  nginx:
    container_name: nginx
    image: nginx
    build: requirements/nginx
    restart: always
    env_file:
      - .env
    ports:
      - "443:443"
    networks:
      - containers_network
    depends_on:
      - wordpress
    volumes:
      - wordpress_volume:/var/www/html
  wordpress:
    container_name: wordpress
    image: wordpress
    build: requirements/wordpress
    restart: always
    env_file:
      - .env
    networks:
      - containers_network
    depends_on:
      - mariadb
    volumes:
      - wordpress_volume:/var/www/html
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 3
  mariadb:
    container_name: mariadb
    image: mariadb
    build: requirements/mariadb
    restart: always
    env_file:
      - .env
    networks:
      - containers_network
    volumes:
      - mariadb_volume:/var/lib/mysql

networks:
  containers_network:
    driver: bridge

volumes:
  mariadb_volume:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/tibarike/data/mariadb
  wordpress_volume:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/tibarike/data/wordpress
